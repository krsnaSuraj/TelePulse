name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build apk --release --obfuscate --split-debug-info=debug-info/

      - name: Extract version
        id: version
        shell: bash
        run: |
          VER=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          APK=$(find build -name "*.apk" -type f | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK"

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-v${{ steps.version.outputs.version }}
          path: debug-info/
          retention-days: 7

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp "${{ env.APK_PATH }}" "release-artifacts/TelePulse-v${{ steps.version.outputs.version }}-release.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: TelePulse-v${{ steps.version.outputs.version }}
          path: release-artifacts/TelePulse-v${{ steps.version.outputs.version }}-release.apk

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TelePulse ${{ github.ref_name }}
          body: |
            ## TelePulse ${{ github.ref_name }}

            Download the APK below to install.
          files: release-artifacts/TelePulse-v${{ steps.version.outputs.version }}-release.apk
          generate_release_notes: true
