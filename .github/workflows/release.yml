name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.12'

      - run: flutter pub get

      - run: flutter build apk --release --obfuscate --split-debug-info=debug-info/

      - name: Extract version
        shell: bash
        run: |
          echo "VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')" >> $GITHUB_ENV

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-v${{ env.VERSION }}
          path: debug-info/
          retention-days: 7

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
            TelePulse-v${{ env.VERSION }}-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: TelePulse-v${{ env.VERSION }}
          path: TelePulse-v${{ env.VERSION }}-release.apk

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TelePulse ${{ github.ref_name }}
          body: |
            ## TelePulse ${{ github.ref_name }}

            Download the APK below to install.
          files: TelePulse-v${{ env.VERSION }}-release.apk
          generate_release_notes: true
